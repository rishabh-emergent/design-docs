- id: I01
  name: Stripe Payment Element (one-time + sub)
  stratum: payments-global
  freshness: HIGH
  tech_stack: [FastAPI, React]
  query: "Stripe Payment Element one-time and subscription"
  constraints: |
    Template stack: FastAPI+React.
    Use case: SaaS app with BOTH one-time digital product purchase AND monthly subscription billing, both via Stripe Payment Element (NOT legacy Card Element).
    Requirements:
      (a) Include all required env vars in a .env.example block.
      (b) Use exact pip/npm package names with specific versions: stripe-python>=8.0 and @stripe/stripe-js latest.
      (c) Webhook handler for invoice.paid AND payment_intent.succeeded.

